{% extends "base.html" %}

{% block title %}Dashboard - Lance CRM{% endblock %}

{% block content %}
<div class="px-4 py-6 sm:px-0">
    <h1 class="text-2xl font-semibold text-gray-900 mb-6">Welcome to your Dashboard</h1>
    
    <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3">
        <!-- Total Leads -->
        <div class="bg-white overflow-hidden shadow rounded-lg">
            <div class="p-5">
                <div class="flex items-center">
                    <div class="flex-shrink-0 bg-blue-500 rounded-md p-3">
                        <i class="fas fa-users text-white text-2xl"></i>
                    </div>
                    <div class="ml-5 w-0 flex-1">
                        <dl>
                            <dt class="text-sm font-medium text-gray-500 truncate">Total Leads</dt>
                            <dd class="flex items-baseline">
                                <div id="total-leads" class="text-2xl font-semibold text-gray-900">0</div>
                            </dd>
                        </dl>
                    </div>
                </div>
            </div>
            <div class="bg-gray-50 px-5 py-3">
                <div class="text-sm">
                    <a href="/leads" class="font-medium text-blue-600 hover:text-blue-500">View all</a>
                </div>
            </div>
        </div>

        <!-- High Value Leads -->
        <div class="bg-white overflow-hidden shadow rounded-lg">
            <div class="p-5">
                <div class="flex items-center">
                    <div class="flex-shrink-0 bg-green-500 rounded-md p-3">
                        <i class="fas fa-star text-white text-2xl"></i>
                    </div>
                    <div class="ml-5 w-0 flex-1">
                        <dl>
                            <dt class="text-sm font-medium text-gray-500 truncate">High-Value Leads (Score 5+)</dt>
                            <dd class="flex items-baseline">
                                <div id="high-value-leads" class="text-2xl font-semibold text-gray-900">0</div>
                            </dd>
                        </dl>
                    </div>
                </div>
            </div>
            <div class="bg-gray-50 px-5 py-3">
                <div class="text-sm">
                    <a href="/leads?min_score=5" class="font-medium text-green-600 hover:text-green-500">View high-value</a>
                </div>
            </div>
        </div>

        <!-- Quick Search -->
        <div class="bg-white overflow-hidden shadow rounded-lg">
            <div class="p-5">
                <div class="flex items-center">
                    <div class="flex-shrink-0 bg-purple-500 rounded-md p-3">
                        <i class="fas fa-search text-white text-2xl"></i>
                    </div>
                    <div class="ml-5 w-0 flex-1">
                        <dl>
                            <dt class="text-sm font-medium text-gray-500 truncate">Find New Businesses</dt>
                            <dd class="flex items-baseline">
                                <div class="text-sm text-gray-600">Explore OSM data</div>
                            </dd>
                        </dl>
                    </div>
                </div>
            </div>
            <div class="bg-gray-50 px-5 py-3">
                <div class="text-sm">
                    <a href="/search" class="font-medium text-purple-600 hover:text-purple-500">Start searching</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function fetchStats() {
        try {
            const response = await fetch('/api/leads/stats/summary');
            const data = await response.json();
            document.getElementById('total-leads').textContent = data.total_leads;
            document.getElementById('high-value-leads').textContent = data.high_value_leads;
        } catch (error) {
            console.error('Error fetching stats:', error);
        }
    }

    document.addEventListener('DOMContentLoaded', fetchStats);
</script>
{% endblock %}
